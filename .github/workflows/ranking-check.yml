name: ランキング確認（毎日12:00）

on:
  schedule:
    - cron: '0 3 * * *'  # UTC 3:00 = JST 12:00
  workflow_dispatch:       # 手動実行も可能

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: スクリプト実行
        run: python ranking_check.py
