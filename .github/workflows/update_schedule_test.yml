name: "[C-040] Venrey スケジュール更新（本番月次SS）"

# 5分ごとに自動実行 + 手動トリガー
on:
  schedule:
    - cron: '*/5 * * * *'  # 5分ごと（GitHub Actions の最短間隔）
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'DRY_RUN（true=読み込み確認のみ・ベンリー更新しない / false=本番更新）'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      selected_staff:
        description: '更新するスタッフ（カンマ区切り。空欄=全員）'
        required: false
        default: ''
      sheet_id:
        description: '月次SS ID（空欄=デフォルトの2026年4月SS）'
        required: false
        default: ''
      skip_site_sync:
        description: 'サイト配信スキップ（true=ベンリー反映のみ / false=サイト配信まで実行）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

# 同時実行を防止（前回処理が終わる前に次回が走らないように）
concurrency:
  group: c-040-venrey-sync
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: pip キャッシュ設定
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-playwright-pandas-requests

      - name: Playwright キャッシュ設定
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: ライブラリをインストール
        run: pip install playwright pandas requests

      - name: Chromium をインストール
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Chromium の依存関係をインストール（キャッシュあり時）
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: 月次SSからベンリー反映 → サイト配信
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          # cron実行時は inputs が無いので空文字（main_test.py側で全員扱い）
          SELECTED_STAFF: ${{ github.event.inputs.selected_staff || '' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          BENRY_TEST_SHEET_ID: ${{ github.event.inputs.sheet_id || '' }}
          SKIP_SITE_SYNC: ${{ github.event.inputs.skip_site_sync || 'false' }}
        run: python main_test.py
